<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub - Order Food Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff5757;
            --primary-dark: #e63946;
            --secondary: #2d3142;
            --accent: #ffd700;
            --light-gray: #f5f5f7;
            --gray: #e8e8e8;
            --dark-gray: #666;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* ============ HEADER ============ */
        .header {
            background: linear-gradient(135deg, #ff5757 0%, #ff7f7f 100%);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(255, 87, 87, 0.15);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -1px;
        }

        .logo span {
            background: white;
            color: #ff5757;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 16px;
            border-radius: 25px;
            flex: 1;
            max-width: 400px;
            gap: 10px;
        }

        .search-bar input {
            border: none;
            outline: none;
            background: transparent;
            flex: 1;
            font-size: 14px;
            color: var(--text-dark);
        }

        .search-bar input::placeholder {
            color: var(--dark-gray);
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 28px;
            color: white;
            transition: var(--transition);
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: var(--text-dark);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        /* ============ MAIN CONTAINER ============ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============ HERO SECTION ============ */
        .hero {
            background: linear-gradient(135deg, rgba(255, 87, 87, 0.1), rgba(255, 127, 127, 0.1));
            padding: 50px 0;
            border-radius: var(--border-radius);
            margin: 30px 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .hero p {
            font-size: 18px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        /* ============ FILTER SECTION ============ */
        .filters {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            overflow-x: auto;
            padding-bottom: 15px;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid var(--gray);
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-dark);
            white-space: nowrap;
            transition: var(--transition);
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(255, 87, 87, 0.05);
        }

        /* ============ RESTAURANTS GRID ============ */
        .restaurants-section {
            margin: 40px 0;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 25px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .restaurants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .restaurant-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--gray);
        }

        .restaurant-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 24px rgba(255, 87, 87, 0.15);
        }

        .restaurant-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #ff5757, #ff7f7f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .restaurant-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 70%, rgba(255, 255, 255, 0.3), transparent);
            pointer-events: none;
        }

        .restaurant-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .restaurant-info {
            padding: 16px;
        }

        .restaurant-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .restaurant-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--text-light);
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(76, 175, 80, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            color: #4caf50;
        }

        .restaurant-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-light);
            flex-wrap: wrap;
        }

        /* ============ ITEMS MODAL ============ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            overflow-y: auto;
            animation: fadeIn 0.3s ease-in;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 30px;
            padding-bottom: 30px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #ff5757 0%, #ff7f7f 100%);
            padding: 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(90deg);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .item-card {
            background: white;
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
            overflow: hidden;
            transition: var(--transition);
        }

        .item-card:hover {
            box-shadow: 0 8px 20px rgba(255, 87, 87, 0.15);
            border-color: var(--primary);
        }

        .item-image {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            position: relative;
        }

        .item-info {
            padding: 15px;
        }

        .item-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .item-description {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        .add-to-cart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: var(--transition);
        }

        .add-to-cart-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* ============ CART SIDEBAR ============ */
        .cart-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 400px;
            background: white;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
            z-index: 999;
            display: flex;
            flex-direction: column;
            transform: translateX(400px);
            transition: transform 0.3s ease-out;
        }

        .cart-sidebar.active {
            transform: translateX(0);
        }

        .cart-header {
            background: var(--secondary);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 20px;
            font-weight: 700;
        }

        .cart-items-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-cart-icon {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 15px;
            background: var(--light-gray);
            border-radius: 10px;
            margin-bottom: 12px;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            flex-shrink: 0;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border-radius: 6px;
            padding: 2px;
            width: fit-content;
        }

        .qty-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .qty-btn:hover {
            transform: scale(1.2);
        }

        .qty-display {
            font-weight: 600;
            color: var(--text-dark);
            min-width: 20px;
            text-align: center;
        }

        .remove-btn {
            color: #d32f2f;
            cursor: pointer;
            font-size: 18px;
            margin-left: auto;
            transition: var(--transition);
        }

        .remove-btn:hover {
            transform: scale(1.2);
        }

        /* ============ CART SUMMARY ============ */
        .cart-summary {
            padding: 20px;
            border-top: 2px solid var(--gray);
            background: var(--light-gray);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-dark);
        }

        .summary-row.total {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            border-top: 1px solid var(--gray);
            padding-top: 12px;
            margin-top: 12px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: var(--transition);
        }

        .checkout-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 87, 87, 0.3);
        }

        .checkout-btn:disabled {
            background: var(--gray);
            cursor: not-allowed;
            transform: none;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .search-bar {
                max-width: 100%;
            }

            .restaurants-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 15px;
                padding: 15px;
            }

            .cart-sidebar {
                width: 100%;
            }

            .modal-content {
                width: 95%;
            }

            .hero h1 {
                font-size: 28px;
            }
        }

        /* ============ SCROLLBAR ============ */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--light-gray);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
</head>

    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span>🍕</span>
                FoodHub
            </div>
            <div class="header-actions">
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="Search restaurants or food items...">
                </div>
                <div class="cart-icon" id="cartToggle">
                    🛒
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <div class="container">
            <!-- HERO SECTION -->
            <section class="hero">
                <h1>🚀 Order Food Delivered Fast</h1>
                <p>Choose from thousands of restaurants and get your favorite food delivered in 30 minutes</p>
            </section>

            <!-- FILTERS -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All Restaurants</button>
                <button class="filter-btn" data-filter="pizza">🍕 Pizza</button>
                <button class="filter-btn" data-filter="burger">🍔 Burgers</button>
                <button class="filter-btn" data-filter="chinese">🥢 Chinese</button>
                <button class="filter-btn" data-filter="indian">🍛 Indian</button>
                <button class="filter-btn" data-filter="dessert">🍰 Desserts</button>
                <button class="filter-btn" data-filter="beverages">☕ Beverages</button>
            </div>

            <!-- RESTAURANTS GRID -->
            <section class="restaurants-section">
                <h2 class="section-title">Popular Restaurants</h2>
                <div class="restaurants-grid" id="restaurantsGrid">
                    <!-- Restaurants will be populated by JavaScript -->
                </div>
            </section>
        </div>
    </main>

    <!-- ITEMS MODAL -->
    <div class="modal" id="itemsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="restaurantNameModal"></h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="items-grid" id="itemsGrid">
                <!-- Items will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- CART SIDEBAR -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-btn" onclick="toggleCart()" style="background: rgba(255, 255, 255, 0.2);">✕</button>
        </div>
        <div class="cart-items-container" id="cartItemsContainer">
            <div class="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <p>Your cart is empty</p>
                <p style="font-size: 12px; margin-top: 10px;">Add items from restaurants to get started</p>
            </div>
        </div>
        <div class="cart-summary" id="cartSummary" style="display: none;">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">₹0</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee:</span>
                <span id="deliveryFee">₹0</span>
            </div>
            <div class="summary-row">
                <span>Tax:</span>
                <span id="tax">₹0</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="totalAmount">₹0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 500;" onclick="closeModal(); toggleCart();"></div>

                cuisine: "beverages",
                items: [
                    { id: 21, name: "Espresso", emoji: "☕", price: 79, desc: "Strong espresso shot" },
                    { id: 22, name: "Cappuccino", emoji: "☕", price: 129, desc: "Creamy cappuccino" },
                    { id: 23, name: "Iced Coffee", emoji: "🧊", price: 109, desc: "Cold coffee with ice" },
                    { id: 24, name: "Smoothie", emoji: "🥤", price: 149, desc: "Fruit smoothie mix" }
                ]
            }
        ];

        let cart = [];
        let selectedRestaurant = null;

        // INITIALIZE
        function init() {
            renderRestaurants();
            setupEventListeners();
        }

        // RENDER RESTAURANTS
        function renderRestaurants(filter = 'all') {
            const grid = document.getElementById('restaurantsGrid');
            let filtered = restaurants;

            if (filter !== 'all') {
                filtered = restaurants.filter(r => r.cuisine === filter);
            }

            grid.innerHTML = filtered.map(restaurant => `
                <div class="restaurant-card" onclick="openRestaurant(${restaurant.id})">
                    <div class="restaurant-image">
                        ${restaurant.emoji}
                        <span class="restaurant-badge">${restaurant.rating} ⭐</span>
                    </div>
                    <div class="restaurant-info">
                        <div class="restaurant-name">${restaurant.name}</div>
                        <div class="restaurant-details">
                            <span class="rating">${restaurant.rating}</span>
                            <span>⏱️ ${restaurant.time}</span>
                        </div>
                        <div class="restaurant-meta">
                            <span>🚚 ${restaurant.delivery}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // OPEN RESTAURANT MODAL
        function openRestaurant(restaurantId) {
            selectedRestaurant = restaurants.find(r => r.id === restaurantId);
            document.getElementById('restaurantNameModal').textContent = selectedRestaurant.name;
            
            const itemsGrid = document.getElementById('itemsGrid');
            itemsGrid.innerHTML = selectedRestaurant.items.map(item => `
                <div class="item-card">
                    <div class="item-image">${item.emoji}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-description">${item.desc}</div>
                        <div class="item-footer">
                            <span class="item-price">₹${item.price}</span>
                            <button class="add-to-cart-btn" onclick="addToCart(${item.id}, '${item.name}', ${item.price}, '${item.emoji}')">Add</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('itemsModal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        // CLOSE MODAL
        function closeModal() {
            document.getElementById('itemsModal').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        // ADD TO CART
        function addToCart(itemId, itemName, itemPrice, itemEmoji) {
            const existingItem = cart.find(item => item.id === itemId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: itemId,
                    name: itemName,
                    price: itemPrice,
                    emoji: itemEmoji,
                    quantity: 1
                });
            }

            updateCart();
            showNotification(`${itemName} added to cart!`);
        }

        // UPDATE CART
        function updateCart() {
            const cartCount = document.getElementById('cartCount');
            const cartItemsContainer = document.getElementById('cartItemsContainer');
            const cartSummary = document.getElementById('cartSummary');

            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Your cart is empty</p>
                        <p style="font-size: 12px; margin-top: 10px;">Add items from restaurants to get started</p>
                    </div>
                `;
                cartSummary.style.display = 'none';
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-image">${item.emoji}</div>
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">₹${item.price}</div>
                            <div class="cart-item-controls">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                                <span class="qty-display">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <span class="remove-btn" onclick="removeFromCart(${item.id})">✕</span>
                    </div>
                `).join('');
                cartSummary.style.display = 'block';
                updateSummary();
            }
        }

        // UPDATE QUANTITY
        function updateQuantity(itemId, change) {
            const item = cart.find(i => i.id === itemId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(itemId);
                } else {
                    updateCart();
                }
            }
        }

        // REMOVE FROM CART
        function removeFromCart(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            updateCart();
        }

        // UPDATE SUMMARY
        function updateSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const deliveryFee = subtotal > 0 ? 40 : 0;
            const tax = Math.round(subtotal * 0.05);
            const total = subtotal + deliveryFee + tax;

            document.getElementById('subtotal').textContent = `₹${subtotal}`;
            document.getElementById('deliveryFee').textContent = `₹${deliveryFee}`;
            document.getElementById('tax').textContent = `₹${tax}`;
            document.getElementById('totalAmount').textContent = `₹${total}`;
        }

        // TOGGLE CART
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('cartSidebar').classList.contains('active') ? 'block' : 'none';
        }

        // CHECKOUT
        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            const total = document.getElementById('totalAmount').textContent;
            alert(`Order placed successfully!\nTotal: ${total}\n\nYour order will be delivered in 30-45 minutes.`);
            cart = [];
            updateCart();
            toggleCart();
        }

        // SETUP EVENT LISTENERS
        function setupEventListeners() {
            document.getElementById('cartToggle').addEventListener('click', toggleCart);
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderRestaurants(btn.dataset.filter);
                });
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const grid = document.getElementById('restaurantsGrid');
                const filtered = restaurants.filter(r => 
                    r.name.toLowerCase().includes(searchTerm)
                );
                grid.innerHTML = filtered.map(restaurant => `
                    <div class="restaurant-card" onclick="openRestaurant(${restaurant.id})">
                        <div class="restaurant-image">
                            ${restaurant.emoji}
                            <span class="restaurant-badge">${restaurant.rating} ⭐</span>
                        </div>
                        <div class="restaurant-info">
                            <div class="restaurant-name">${restaurant.name}</div>
                            <div class="restaurant-details">
                                <span class="rating">${restaurant.rating}</span>
                                <span>⏱️ ${restaurant.time}</span>
                            </div>
                            <div class="restaurant-meta">
                                <span>🚚 ${restaurant.delivery}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            });
        }

        // NOTIFICATION
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: var(--primary);
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                z-index: 2000;
                animation: slideInRight 0.3s ease-out;
                font-weight: 600;
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }

        // START
        init();
    </script>
</body>
</html>
